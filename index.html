<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: transparent; overflow: hidden; }
        
        /* Контейнер для колеса и стрелки */
        .wheel-container { position: relative; width: 450px; height: 450px; }
        
        /* СТИЛЬНАЯ СТРЕЛКА */
        .pointer {
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
            width: 0; height: 0; 
            border-left: 20px solid transparent; border-right: 20px solid transparent;
            border-top: 35px solid #ff4b2b; /* Цвет стрелки */
            z-index: 10; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        #canvas { width: 100%; height: 100%; transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); }
        
        .controls { margin-top: 20px; display: flex; gap: 10px; }
        button { padding: 12px 24px; font-size: 16px; font-weight: bold; cursor: pointer; background: #000; color: #fff; border: none; border-radius: 8px; }
        
        #result { 
            margin-bottom: 15px; font-size: 20px; font-weight: bold; 
            text-align: center; color: #333; height: 30px; 
        }
    </style>
</head>
<body>

    <div id="result">Нажми "УДАЧА", чтобы выбрать дело!</div>
    
    <div class="wheel-container">
        <div class="pointer"></div>
        <canvas id="canvas" width="500" height="500"></canvas>
    </div>
    
    <div class="controls">
        <button id="spinBtn">УДАЧА!</button>
        <button id="settingsBtn" style="background:#eee; color:#333;">⚙️</button>
    </div>

<script>
let tasks = [];
let currentRotation = 0;
let isSpinning = false;

let NOTION_TOKEN = localStorage.getItem('notion_token');
let DATABASE_ID = localStorage.getItem('database_id');
const PROXY_URL = "https://corsproxy.io/?"; 

async function fetchTasks() {
    if (!NOTION_TOKEN || !DATABASE_ID) return;
    try {
        const response = await fetch(PROXY_URL + encodeURIComponent(`https://api.notion.com/v1/databases/${DATABASE_ID}/query`), {
            method: "POST",
            headers: { "Authorization": `Bearer ${NOTION_TOKEN}`, "Notion-Version": "2022-06-28", "Content-Type": "application/json" },
            body: JSON.stringify({ filter: { property: "status", status: { does_not_equal: "Done" } } })
        });
        const data = await response.json();
        const now = new Date();

        tasks = data.results.map((page, index) => {
            const name = page.properties["name"]?.title[0]?.plain_text || "Без названия";
            const deadlineStr = page.properties["deadline"]?.date?.start;
            let weight = 20; 
            if (deadlineStr) {
                const diffDays = Math.ceil((new Date(deadlineStr) - now) / (1000 * 60 * 60 * 24));
                weight = diffDays < 0 ? 80 : diffDays === 0 ? 60 : diffDays <= 3 ? 40 : 20;
            }
            // Генерируем цвет на основе индекса, чтобы он был постоянным
            return { name, weight, color: `hsl(${(index * 360 / 10) % 360}, 70%, 60%)` };
        }).slice(0, 12);

        drawWheel();
    } catch (e) { console.error(e); }
}

function drawWheel() {
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const totalWeight = tasks.reduce((sum, t) => sum + t.weight, 0);
    let startAngle = -Math.PI / 2; // Начинаем сверху (под стрелкой)

    ctx.clearRect(0, 0, 500, 500);
    tasks.forEach(task => {
        const sliceAngle = (task.weight / totalWeight) * 2 * Math.PI;
        ctx.beginPath();
        ctx.moveTo(250, 250);
        ctx.arc(250, 250, 240, startAngle, startAngle + sliceAngle);
        ctx.fillStyle = task.color;
        ctx.fill();
        ctx.stroke();

        ctx.save();
        ctx.translate(250, 250);
        ctx.rotate(startAngle + sliceAngle / 2);
        ctx.fillStyle = "#fff";
        ctx.font = "bold 14px sans-serif";
        ctx.fillText(task.name.substring(0, 15), 100, 5);
        ctx.restore();
        
        task.startA = startAngle;
        task.endA = startAngle + sliceAngle;
        startAngle += sliceAngle;
    });
}

function spin() {
    if (isSpinning || tasks.length === 0) return;
    isSpinning = true;
    document.getElementById("result").innerText = "Крутим...";
    
    const extraSpins = (Math.floor(Math.random() * 5) + 5) * 360; 
    const randomOffset = Math.random() * 360;
    const finalRotation = currentRotation + extraSpins + randomOffset;
    
    const canvas = document.getElementById("canvas");
    canvas.style.transform = `rotate(${finalRotation}deg)`;
    
    setTimeout(() => {
        isSpinning = false;
        // Расчет победителя
        const actualRotation = finalRotation % 360;
        const totalWeight = tasks.reduce((sum, t) => sum + t.weight, 0);
        
        // Магия пересчета угла в сектор
        let invertedRotation = (360 - actualRotation) % 360;
        let cumulativeAngle = 0;
        let winner = tasks[0];

        tasks.forEach(task => {
            const sliceDeg = (task.weight / totalWeight) * 360;
            if (invertedRotation >= cumulativeAngle && invertedRotation < cumulativeAngle + sliceDeg) {
                winner = task;
            }
            cumulativeAngle += sliceDeg;
        });

        document.getElementById("result").innerText = "ВЫПАЛО: " + winner.name;
        currentRotation = finalRotation;
    }, 4000);
}

document.getElementById('settingsBtn').onclick = () => {
    const t = prompt("Token:", NOTION_TOKEN || "");
    const d = prompt("ID:", DATABASE_ID || "");
    if (t && d) { localStorage.setItem('notion_token', t); localStorage.setItem('database_id', d); location.reload(); }
};
document.getElementById("spinBtn").onclick = spin;
fetchTasks();
</script>
</body>
</html>
