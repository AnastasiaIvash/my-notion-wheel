<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Notion Smart Wheel</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; background: transparent; overflow: hidden; }
        #canvas { max-width: 90vw; max-height: 70vh; filter: drop-shadow(0 10px 20px rgba(0,0,0,0.15)); cursor: pointer; transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1); }
        .controls { position: absolute; bottom: 20px; display: flex; gap: 10px; }
        button { padding: 12px 24px; font-size: 16px; font-weight: 600; cursor: pointer; background: #000; color: #fff; border: none; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        button:hover { opacity: 0.8; }
        #settingsBtn { background: #eee; color: #333; }
        #result { position: absolute; top: 20px; font-size: 22px; font-weight: bold; text-align: center; color: #333; text-shadow: 0 2px 4px rgba(255,255,255,0.8); pointer-events: none; }
    </style>
</head>
<body>

    <div id="result">Нажми, чтобы крутить!</div>
    <canvas id="canvas" width="500" height="500"></canvas>
    
    <div class="controls">
        <button id="spinBtn">УДАЧА!</button>
        <button id="settingsBtn">⚙️</button>
    </div>

<script>
let tasks = [];
let currentRotation = 0;
let isSpinning = false;

// Загрузка настроек из памяти браузера
let NOTION_TOKEN = localStorage.getItem('notion_token');
let DATABASE_ID = localStorage.getItem('database_id');

const PROXY_URL = "https://corsproxy.io/?"; 

async function fetchTasks() {
    if (!NOTION_TOKEN || !DATABASE_ID) {
        document.getElementById('result').innerText = "Настрой API (кнопка ⚙️)";
        return;
    }

    try {
        const response = await fetch(PROXY_URL + encodeURIComponent(`https://api.notion.com/v1/databases/${DATABASE_ID}/query`), {
            method: "POST",
            headers: {
                "Authorization": `Bearer ${NOTION_TOKEN}`,
                "Notion-Version": "2022-06-28",
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                filter: { 
                    property: "status", // Проверь, чтобы в Notion было "Статус"
                    status: { does_not_equal: "Done" } 
                }
            })
        });
        const data = await response.json();
        
        const now = new Date();

        tasks = data.results.map(page => {
            const name = page.properties["name"]?.title[0]?.plain_text || "Без названия";
            const deadlineStr = page.properties["deadline"]?.date?.start;
            
            // Базовый вес (базовая ширина сектора)
            let weight = 20; 

            if (deadlineStr) {
                const deadline = new Date(deadlineStr);
                const diffTime = deadline - now;
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

                // УМНАЯ ЛОГИКА ПРИОРИТЕТА:
                if (diffDays < 0) weight = 80;      // Просрочено — огромный сектор
                else if (diffDays === 0) weight = 60; // Сегодня — очень большой
                else if (diffDays <= 3) weight = 40;  // Ближайшие 3 дня — заметный
                else weight = 20;                     // Далекие задачи — стандартный
            }

            return { 
                name, 
                weight, 
                color: `hsl(${Math.random() * 360}, 70%, 60%)` 
            };
        }).filter(t => t.name !== "Без названия").slice(0, 15);

        drawWheel();
    } catch (e) {
        console.error(e);
        alert("Ошибка! Проверь названия свойств (Название, Дедлайн, Статус).");
    }
}

function drawWheel() {
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");
    const totalWeight = tasks.reduce((sum, t) => sum + t.weight, 0);
    let startAngle = 0;

    ctx.clearRect(0, 0, 500, 500);
    if (tasks.length === 0) return;

    tasks.forEach(task => {
        const sliceAngle = (task.weight / totalWeight) * 2 * Math.PI;
        ctx.beginPath();
        ctx.moveTo(250, 250);
        ctx.arc(250, 250, 240, startAngle, startAngle + sliceAngle);
        ctx.fillStyle = task.color;
        ctx.fill();
        ctx.strokeStyle = "#fff";
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.save();
        ctx.translate(250, 250);
        ctx.rotate(startAngle + sliceAngle / 2);
        ctx.fillStyle = "#fff";
        ctx.font = "bold 16px sans-serif";
        ctx.fillText(task.name.substring(0, 15), 80, 5);
        ctx.restore();
        startAngle += sliceAngle;
    });
}

function spin() {
    if (isSpinning || tasks.length === 0) return;
    isSpinning = true;
    
    const extraSpins = Math.floor(Math.random() * 5 + 5) * 360;
    const finalRotation = currentRotation + extraSpins + Math.random() * 360;
    
    const canvas = document.getElementById("canvas");
    canvas.style.transform = `rotate(${finalRotation}deg)`;
    currentRotation = finalRotation;
    
    setTimeout(() => {
        isSpinning = false;
        document.getElementById("result").innerText = "Готово! Делай это!";
    }, 4000);
}

document.getElementById('settingsBtn').onclick = () => {
    const t = prompt("Вставь Notion Integration Token:", NOTION_TOKEN || "");
    const d = prompt("Вставь Database ID:", DATABASE_ID || "");
    if (t && d) {
        localStorage.setItem('notion_token', t);
        localStorage.setItem('database_id', d);
        location.reload();
    }
};

document.getElementById("spinBtn").onclick = spin;
document.getElementById("canvas").onclick = spin;
fetchTasks();
</script>
</body>
</html>
